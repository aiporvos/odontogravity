<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dental Studio Pro - Sistema de gestión integral para consultorios odontológicos">
    <title>Dental Studio Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦷</text></svg>">
</head>
<body>
    <!-- ═══════════════ LOGIN SCREEN ═══════════════ -->
    <div id="login-screen" class="login-screen">
        <div class="login-container">
            <div class="login-brand">
                <div class="login-logo">🦷</div>
                <h1>Dental Studio <span>Pro</span></h1>
                <p>Sistema de Gestión Integral</p>
            </div>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="admin@dentalstudio.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary btn-block">
                    <span>Iniciar Sesión</span>
                </button>
                <p id="login-error" class="login-error"></p>
            </form>
        </div>
    </div>

    <!-- ═══════════════ MAIN APP ═══════════════ -->
    <div id="app" class="app hidden">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-brand">
                <span class="brand-icon">🦷</span>
                <span class="brand-text">Dental Studio</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <span class="nav-label">Clínica</span>
                    <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                        <span>Dashboard</span>
                    </a>
                    <a href="#" class="nav-item" data-page="agenda" id="nav-agenda">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        <span>Agenda</span>
                    </a>
                    <a href="#" class="nav-item" data-page="patients" id="nav-patients">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        <span>Pacientes</span>
                    </a>
                    <a href="#" class="nav-item" data-page="odontogram" id="nav-odontogram">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8 2 6 5 6 8c0 3 1 5 2 7s2 5 2 7c0 0 1 0 2-2 1 2 2 2 2 2 0-2 1-5 2-7s2-4 2-7c0-3-2-6-6-6z"/></svg>
                        <span>Odontograma</span>
                    </a>
                </div>
                <div class="nav-section" id="admin-nav" style="display:none">
                    <span class="nav-label">Administración</span>
                    <a href="#" class="nav-item" data-page="users" id="nav-users">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                        <span>Usuarios</span>
                    </a>
                    <a href="#" class="nav-item" data-page="professionals" id="nav-professionals">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                        <span>Profesionales</span>
                    </a>
                    <a href="#" class="nav-item" data-page="settings" id="nav-settings">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        <span>Configuración</span>
                    </a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" id="user-info">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-details">
                        <span class="user-name" id="user-name">Admin</span>
                        <span class="user-role" id="user-role">admin</span>
                    </div>
                </div>
                <button class="btn-logout" id="btn-logout" title="Cerrar Sesión">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- TOP BAR -->
            <header class="topbar">
                <button class="btn-menu" id="btn-menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="omnibox" id="omnibox">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="omnibox-input" placeholder="Buscar paciente, profesional, DNI..." autocomplete="off">
                    <div class="omnibox-results" id="omnibox-results"></div>
                </div>
                <div class="topbar-actions">
                    <span class="topbar-date" id="topbar-date"></span>
                </div>
            </header>

            <!-- PAGE CONTAINER -->
            <div class="page-container" id="page-container">
                <!-- Pages are loaded dynamically -->
            </div>
        </main>

        <!-- QUICK ACTION FAB -->
        <div class="fab-container" id="fab-container">
            <button class="fab" id="fab-main" title="Acciones Rápidas">+</button>
            <div class="fab-menu" id="fab-menu">
                <button class="fab-action" data-action="new-appointment" id="fab-new-appointment">
                    <span>📅</span> Nuevo Turno
                </button>
                <button class="fab-action" data-action="new-patient" id="fab-new-patient">
                    <span>👤</span> Nuevo Paciente
                </button>
            </div>
        </div>
    </div>

    <!-- ═══════════════ MODAL ═══════════════ -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h2 id="modal-title">Modal</h2>
                <button class="modal-close" id="modal-close">×</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="shared_components/api.js"></script>
    <script src="shared_components/router.js"></script>
    <script src="shared_components/components.js"></script>
    <script src="app_clinic/dashboard.js"></script>
    <script src="app_clinic/agenda.js"></script>
    <script src="app_clinic/patients.js"></script>
    <script src="app_clinic/odontogram.js"></script>
    <script src="app_admin/users.js"></script>
    <script src="app_admin/professionals.js"></script>
    <script src="app_admin/settings.js"></script>
    <script src="app.js"></script>
</body>
</html>
