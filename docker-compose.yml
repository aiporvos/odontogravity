# ═══════════════════════════════════════════════════════
# Dental Studio Pro - Docker Compose
# Listo para Dokploy
# ═══════════════════════════════════════════════════════

services:
  # ── PostgreSQL Database ───────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dentibot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dentibot_secure_2024}
      POSTGRES_DB: ${POSTGRES_DB:-dentibot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dentibot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dentinet

  # ── Backend (FastAPI + Frontend SPA) ──────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dentibot:dentibot_secure_2024@db:5432/dentibot}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production-please-2024}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      API_BASE_URL: ${API_BASE_URL:-http://backend:8000}
      BOT_API_KEY: ${BOT_API_KEY:-dev-bot-key-change-in-prod}
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend
      - ./backend:/app/backend
    networks:
      - dentinet

  # ── DentiBot (Telegram) ──────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dentibot:dentibot_secure_2024@db:5432/dentibot}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      BOT_PORT: ${BOT_PORT:-8443}
      API_BASE_URL: ${API_BASE_URL:-http://backend:8000}
      BOT_API_KEY: ${BOT_API_KEY:-dev-bot-key-change-in-prod}
    command: ["python", "-m", "bot.telegram_bot"]
    ports:
      - "8443:8443"
    volumes:
      - ./bot:/app/bot
      - ./backend:/app/backend
    networks:
      - dentinet

networks:
  dentinet:
    driver: bridge

volumes:
  pgdata:
    driver: local
